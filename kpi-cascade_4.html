<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KPI Каскад — Sminex ИТ Департамент</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Segoe UI', system-ui, sans-serif;
    background: #0a0a14;
    color: #fff;
    min-height: 100vh;
    padding: 32px 24px;
  }

  /* HEADER */
  .header {
    text-align: center;
    margin-bottom: 32px;
  }
  .header-label {
    font-size: 11px;
    letter-spacing: 3px;
    color: #e94560;
    text-transform: uppercase;
    margin-bottom: 8px;
  }
  .header h1 {
    font-size: 24px;
    font-weight: 800;
    letter-spacing: -0.5px;
  }
  .header p {
    margin-top: 6px;
    font-size: 13px;
    color: rgba(255,255,255,0.4);
  }

  /* DEPT BLOCK */
  .dept-block {
    background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
    border: 1px solid rgba(233,69,96,0.4);
    border-radius: 14px;
    padding: 22px;
    margin-bottom: 20px;
  }
  .block-title-row {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 16px;
  }
  .accent-bar {
    width: 4px;
    border-radius: 2px;
    flex-shrink: 0;
  }
  .block-title { font-size: 15px; font-weight: 800; }
  .block-sub { font-size: 11px; color: rgba(255,255,255,0.4); margin-top: 2px; }

  /* ARROW */
  .arrow {
    text-align: center;
    font-size: 22px;
    color: rgba(255,255,255,0.18);
    margin: 12px 0;
  }

  /* STREAMS */
  .streams {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
  }
  @media (max-width: 900px) {
    .streams { grid-template-columns: 1fr; }
  }

  .stream-block {
    border-radius: 14px;
    padding: 20px;
    border: 1px solid transparent;
  }

  /* TAG CHIPS */
  .chip-row {
    display: flex;
    flex-wrap: wrap;
    gap: 5px;
    margin-bottom: 18px;
  }
  .chip {
    font-size: 10px;
    border-radius: 4px;
    padding: 3px 8px;
    border: 1px solid transparent;
    font-weight: 600;
  }

  /* ROLE SECTION */
  .role-section { margin-bottom: 18px; }
  .role-header {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 10px;
  }
  .role-bar { width: 3px; height: 18px; border-radius: 2px; flex-shrink: 0; }
  .role-name {
    font-size: 11px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: #ddd;
  }
  .trace-badges { display: flex; gap: 4px; }
  .trace-badge {
    font-size: 10px;
    font-weight: 700;
    background: rgba(0,0,0,0.35);
    border-radius: 4px;
    padding: 1px 6px;
  }

  /* KPI GRID */
  .kpi-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
  }
  @media (max-width: 600px) {
    .kpi-grid { grid-template-columns: 1fr; }
  }

  /* KPI CARD */
  .kpi-card {
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 9px;
    padding: 12px 13px;
    cursor: default;
    transition: background 0.18s, border-color 0.18s, opacity 0.18s;
  }
  .kpi-card:hover {
    background: rgba(255,255,255,0.1);
  }
  .kpi-card.highlighted {
    background: rgba(255,255,255,0.13);
  }
  .kpi-card.dimmed {
    opacity: 0.28;
  }

  .kpi-top {
    display: flex;
    align-items: flex-start;
    gap: 9px;
  }
  .kpi-id {
    font-family: monospace;
    font-size: 10px;
    font-weight: 700;
    background: rgba(0,0,0,0.3);
    border-radius: 4px;
    padding: 2px 6px;
    white-space: nowrap;
    margin-top: 1px;
    flex-shrink: 0;
  }
  .kpi-body { flex: 1; min-width: 0; }
  .kpi-labelrow {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    gap: 8px;
  }
  .kpi-label {
    font-size: 12px;
    font-weight: 600;
    color: #f0f0f0;
    line-height: 1.35;
  }
  .kpi-target {
    font-size: 11px;
    font-weight: 700;
    color: #52b788;
    background: rgba(82,183,136,0.15);
    border-radius: 4px;
    padding: 2px 7px;
    white-space: nowrap;
    flex-shrink: 0;
  }
  .kpi-desc {
    font-size: 11px;
    color: rgba(255,255,255,0.45);
    margin-top: 5px;
    line-height: 1.4;
  }
  .kpi-trace {
    margin-top: 6px;
    font-size: 10px;
    display: flex;
    align-items: center;
    gap: 4px;
  }

  /* LEGEND */
  .legend {
    margin-top: 20px;
    background: rgba(255,255,255,0.03);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 10px;
    padding: 13px 18px;
    display: flex;
    gap: 20px;
    flex-wrap: wrap;
    align-items: center;
  }
  .legend-label {
    font-size: 11px;
    color: rgba(255,255,255,0.28);
    font-weight: 700;
    letter-spacing: 1px;
    text-transform: uppercase;
  }
  .legend-item { display: flex; align-items: center; gap: 6px; }
  .legend-dot { width: 10px; height: 10px; border-radius: 2px; flex-shrink: 0; }
  .legend-text { font-size: 11px; color: rgba(255,255,255,0.5); }
  .legend-hint {
    margin-left: auto;
    font-size: 11px;
    color: rgba(255,255,255,0.25);
  }
</style>
</head>
<body>

<div class="header">
  <div class="header-label">Sminex · ИТ Департамент</div>
  <h1>Трассируемая система KPI</h1>
  <p>Один вектор — разная ответственность. Наведите на KPI, чтобы увидеть связи.</p>
</div>

<div id="app"></div>

<script>
const COLORS = {
  K1:"#e94560", K2:"#f4a261", K3:"#e76f51", K4:"#a8dadc",
  C1:"#53d8fb", C2:"#53d8fb", C3:"#53d8fb", C4:"#53d8fb",
  R1:"#52b788", R2:"#52b788", R3:"#52b788", R4:"#52b788", R5:"#52b788",
  P1:"#74c0fc", P2:"#74c0fc", P3:"#74c0fc", P4:"#74c0fc",
  S1:"#c77dff", S2:"#c77dff", S3:"#c77dff", S4:"#c77dff",
};

const DATA = {
  dept: {
    kpis: [
      { id:"K1", label:"Удовлетворённость бизнеса (CSI)", target:"≥ 4.0 / 5.0", desc:"NPS/CSI опрос бизнес-заказчиков по всем кластерам, квартально" },
      { id:"K2", label:"Выполнение задач в срок", target:"≥ 85%", desc:"Доля задач, закрытых в согласованный срок, по всему департаменту" },
      { id:"K3", label:"Доля инцидентов после релиза", target:"≤ 5%", desc:"Критические баги и откаты к общему числу релизов" },
      { id:"K4", label:"Исполнение ИТ-бюджета", target:"±5%", desc:"Отклонение факт/план по бюджету ресурсов и подрядчиков" },
    ]
  },
  streams: [
    {
      id: "clusters",
      title: "Продуктовые кластеры",
      highlight: "#53d8fb",
      bg: "linear-gradient(135deg, #16213e 0%, rgba(255,255,255,0.01) 100%)",
      border: "rgba(83,216,251,0.2)",
      chips: ["Кластер взаимодействия с клиентами","Кластер корпоративных систем","Кластер цифровизации финансов","Кластер цифровизации строительства"],
      roles: [
        {
          role: "Руководитель кластера",
          tracesFrom: ["K1","K2","K3","K4"],
          kpis: [
            { id:"C1", label:"CSI по кластеру", target:"≥ 4.0", trace:"K1", desc:"Удовлетворённость бизнес-заказчиков своего кластера" },
            { id:"C2", label:"Исполнение обязательств перед бизнесом в срок", target:"≥ 85%", trace:"K2", desc:"% обязательств (эпики, релизы, ключевые фичи), по которым кластер выполнил договорённость с бизнес-заказчиком в согласованные сроки" },
            { id:"C3", label:"Инциденты по кластеру", target:"≤ 5%", trace:"K3", desc:"Доля постпродуктивных дефектов в продуктах кластера" },
            { id:"C4", label:"Соотношение Change / RUN в бюджете", target:"≥ 60% / ≤ 40%", trace:"K4", desc:"Доля бюджета кластера, направленная на развитие (Change) vs. поддержку и эксплуатацию (RUN)" },
          ]
        },
        {
          role: "Product Owner",
          tracesFrom: ["C1","C2","C3","C4"],
          kpis: [
            { id:"P1", label:"CSI по продукту", target:"≥ 4.0", trace:"C1", desc:"Оценка стейкхолдером конкретного продукта/сервиса" },
            { id:"P2", label:"Предсказуемость спринта", target:"≥ 80%", trace:"C2", desc:"% задач из спринт-плана, закрытых в том же спринте без переноса — зрелость планирования PO" },
            { id:"P3", label:"Фиксация и согласование Acceptance Criteria с бизнесом", target:"≥ 90% задач", trace:"C3", desc:"Доля задач, ушедших в разработку с задокументированными и согласованными с бизнес-заказчиком критериями приёмки в Jira" },
            { id:"P4", label:"Утилизация ресурсов", target:"80–90%", trace:"C4", desc:"Доля рабочего времени аллоцированных специалистов на продуктовых задачах" },
          ]
        }
      ]
    },
    {
      id: "rce",
      title: "Центры экспертизы (РЦЭ)",
      highlight: "#52b788",
      bg: "linear-gradient(135deg, #0d1b2a 0%, rgba(255,255,255,0.01) 100%)",
      border: "rgba(82,183,136,0.2)",
      chips: ["Backend разработка","Frontend разработка","1С разработка","Системный анализ","UX/UI"],
      roles: [
        {
          role: "Руководитель РЦЭ",
          tracesFrom: ["K2","K3","K4"],
          kpis: [
            { id:"R1", label:"Управление техдолгом", target:"≤ 15% бэклога", trace:"K3", desc:"Доля tech-debt задач в общем бэклоге — РЦЭ инициирует и контролирует расчистку" },
            { id:"R2", label:"Прогнозируемость поставки", target:"откл. ≤ 20%", trace:"K2", desc:"Отклонение факт/план по трудозатратам на задачах специалистов РЦЭ" },
            { id:"R3", label:"Наличие и соблюдение DoD по всем типам задач РЦЭ", target:"100% покрытие + ≥ 90% соблюдение", trace:"K3", desc:"Для каждого типа задач центра задокументирован Definition of Done, его соблюдение проверяется на регулярном аудите раз в квартал" },
            { id:"R4", label:"Выполнение ИПР команды", target:"≥ 80%", trace:null, desc:"Доля специалистов, выполнивших план развития за год" },
            { id:"R5", label:"AI Adoption: сокращение трудозатрат", target:"≥ 10%", trace:"K4", desc:"Сокращение часов на задачах, где применяются AI-инструменты, к концу года. Базовый замер — Q1." },
          ]
        },
        {
          role: "Специалист РЦЭ",
          tracesFrom: ["R1","R2","R3","R5"],
          kpis: [
            { id:"S1", label:"% задач в срок", target:"≥ 85%", trace:"R2", desc:"Личная дисциплина по дедлайнам задач в Jira" },
            { id:"S2", label:"Соблюдение квоты на разбор техдолга", target:"≥ 15% задач в спринте", trace:"R1", desc:"Специалист резервирует согласованную долю спринта на расчистку технического долга, не только на фичи" },
            { id:"S3", label:"Выполнение индивидуального плана развития (ИПР)", target:"100%", trace:"R4", desc:"Реализация согласованного с руководителем плана развития — курсы, сертификации, прокачка компетенций по роли" },
            { id:"S4", label:"Использование AI в работе", target:"регулярно", trace:"R5", desc:"Фиксация применения AI-инструментов в таймшите / отчёте по треку" },
          ]
        }
      ]
    }
  ]
};

let hovered = null;

function color(id) { return COLORS[id] || "rgba(255,255,255,0.5)"; }

function kpiCard(kpi) {
  const isHL = hovered === kpi.trace || hovered === kpi.id;
  const isDim = hovered && !isHL;
  const traceHtml = kpi.trace
    ? `<div class="kpi-trace" style="color:${color(kpi.trace)}">↑ трассируется из <strong>${kpi.trace}</strong></div>`
    : "";
  return `
    <div class="kpi-card ${isHL?"highlighted":""} ${isDim?"dimmed":""}"
         style="border-color:${isHL ? color(kpi.id) : "rgba(255,255,255,0.1)"}"
         data-id="${kpi.id}" data-trace="${kpi.trace||""}">
      <div class="kpi-top">
        <span class="kpi-id" style="color:${color(kpi.id)}">${kpi.id}</span>
        <div class="kpi-body">
          <div class="kpi-labelrow">
            <span class="kpi-label">${kpi.label}</span>
            <span class="kpi-target">${kpi.target}</span>
          </div>
          <div class="kpi-desc">${kpi.desc}</div>
          ${traceHtml}
        </div>
      </div>
    </div>`;
}

function roleSection(role, highlight) {
  const badges = role.tracesFrom.map(t =>
    `<span class="trace-badge" style="color:${color(t)}">↑${t}</span>`
  ).join("");
  const cards = role.kpis.map(kpiCard).join("");
  return `
    <div class="role-section">
      <div class="role-header">
        <div class="role-bar" style="background:${highlight}"></div>
        <span class="role-name">${role.role}</span>
        <div class="trace-badges">${badges}</div>
      </div>
      <div class="kpi-grid">${cards}</div>
    </div>`;
}

function render() {
  const deptCards = DATA.dept.kpis.map(kpiCard).join("");

  const streamsHtml = DATA.streams.map(s => {
    const chips = s.chips.map(c =>
      `<span class="chip" style="color:${s.highlight};background:${s.highlight}18;border-color:${s.highlight}30">${c}</span>`
    ).join("");

    const rolesHtml = s.roles.map((r, i) => {
      const arrow = i > 0 ? `<div class="arrow" style="margin:6px 0">↓</div>` : "";
      return arrow + roleSection(r, s.highlight);
    }).join("");

    return `
      <div class="stream-block" style="background:${s.bg};border-color:${s.border}">
        <div class="block-title-row">
          <div class="accent-bar" style="background:${s.highlight};height:22px"></div>
          <div>
            <div class="block-title" style="color:${s.highlight}">${s.title}</div>
          </div>
        </div>
        <div class="chip-row">${chips}</div>
        ${rolesHtml}
      </div>`;
  }).join("");

  const html = `
    <div class="dept-block">
      <div class="block-title-row">
        <div class="accent-bar" style="background:#e94560;height:26px"></div>
        <div>
          <div class="block-title">Уровень 1 — ИТ Департамент</div>
          <div class="block-sub">Общие KPI · Источник для всех ролей</div>
        </div>
      </div>
      <div class="kpi-grid">${deptCards}</div>
    </div>
    <div class="arrow">↓</div>
    <div class="streams">${streamsHtml}</div>
    <div class="legend">
      <span class="legend-label">Легенда</span>
      ${[
        {c:"#e94560", l:"Общий KPI (K1–K4)"},
        {c:"#53d8fb", l:"Кластер (C1–C4)"},
        {c:"#52b788", l:"Руководитель РЦЭ (R1–R5)"},
        {c:"#74c0fc", l:"Product Owner (P1–P4)"},
        {c:"#c77dff", l:"Специалист РЦЭ (S1–S4)"},
      ].map(i=>`<div class="legend-item"><div class="legend-dot" style="background:${i.c}"></div><span class="legend-text">${i.l}</span></div>`).join("")}
      <span class="legend-hint">Наведите на карточку для подсветки трассировки</span>
    </div>`;

  document.getElementById("app").innerHTML = html;
  attachEvents();
}

function attachEvents() {
  document.querySelectorAll(".kpi-card").forEach(el => {
    el.addEventListener("mouseenter", () => {
      hovered = el.dataset.id;
      render();
    });
    el.addEventListener("mouseleave", () => {
      hovered = null;
      render();
    });
  });
}

render();
</script>
</body>
</html>
